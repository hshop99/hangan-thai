<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงประกาศงาน - หางานไทย</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <header>
    <nav>
        <div class="logo">หางานไทย</div>
        <div class="menu">
            <a href="index.html">หน้าแรก</a>
            <a href="jobs.html">ค้นหางาน</a>
            <a href="post-job.html">ลงประกาศงาน</a>
            <a href="profile.html">โปรไฟล์</a>
        </div>
        <div class="auth" id="authSection">
            <!-- JavaScript จะเปลี่ยนส่วนนี้ -->
        </div>
    </nav>
</header>
    </header>

    <main style="padding: 40px 20px; max-width: 800px; margin: 0 auto;">
        <h1 style="text-align: center; margin-bottom: 30px;">ลงประกาศงานฟรี</h1>
        
        <div style="background: white; padding: 35px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1);">
            <label>ประเภทงาน</label>
            <select id="jobType" style="width:100%; padding:12px; margin:10px 0 20px 0;">
                <option value="daily">งานรายวัน</option>
                <option value="fulltime">งานประจำ</option>
            </select>

            <label>ตำแหน่งงาน</label>
            <input type="text" id="title" placeholder="เช่น พนักงานช่วยงานก่อสร้าง" style="width:100%; padding:12px; margin:10px 0 20px 0;">

            <label>ค่าจ้าง / เงินเดือน</label>
            <input type="text" id="wage" placeholder="เช่น 450 บาท/วัน หรือ 13000 บาท/เดือน" style="width:100%; padding:12px; margin:10px 0 20px 0;">

            <label>สถานที่</label>
            <input type="text" id="location" placeholder="เช่น บางบ่อ, สมุทรปราการ" style="width:100%; padding:12px; margin:10px 0 20px 0;">

            <label>รายละเอียดงาน</label>
            <textarea id="description" rows="5" placeholder="อธิบายงาน..." style="width:100%; padding:12px; margin:10px 0 20px 0;"></textarea>

            <button onclick="postJob()" style="width:100%; padding:15px; background:#28a745; color:white; border:none; border-radius:8px; font-size:18px;">
                โพสต์ประกาศงานฟรี
            </button>
        </div>
    </main>

    <footer>
        <p>© 2026 หางานไทย</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
