<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - หางานไทย</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">หางานไทย</div>
            <div class="menu">
                <a href="index.html">หน้าแรก</a>
                <a href="jobs.html">ค้นหางาน</a>
                <a href="post-job.html">ลงประกาศงาน</a>
            </div>
            <div class="auth">
                <button onclick="window.location.href='index.html'">กลับหน้าแรก</button>
            </div>
        </nav>
    </header>

    <main style="padding: 60px 20px; max-width: 500px; margin: 0 auto;">
        <h1 style="text-align:center; margin-bottom:30px;">สมัครสมาชิกฟรี</h1>
        
        <div style="background:white; padding:35px; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,0.1);">
            <input type="text" id="regName" placeholder="ชื่อ-นามสกุล" style="width:100%; padding:12px; margin:10px 0;">
            <input type="email" id="regEmail" placeholder="อีเมล" style="width:100%; padding:12px; margin:10px 0;">
            <input type="tel" id="regPhone" placeholder="เบอร์โทร" style="width:100%; padding:12px; margin:10px 0;">
            <select id="regType" style="width:100%; padding:12px; margin:10px 0;">
                <option value="worker">ฉันเป็นผู้หางาน</option>
                <option value="employer">ฉันเป็นนายจ้าง</option>
            </select>
            
            <button onclick="registerUser()" style="width:100%; padding:15px; background:#28a745; color:white; border:none; border-radius:8px; margin-top:15px;">
                สมัครสมาชิก
            </button>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
